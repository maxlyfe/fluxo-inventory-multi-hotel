[build]
  publish = "dist"
  command = "npx tsc --noEmit --skipLibCheck && npm run build"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[dev]
  command   = "vite"
  targetPort = 5173
  port       = 8888
  autoLaunch = false

# Bridge OAuth para o APK — serve HTML estático ANTES do catch-all SPA
[[redirects]]
  from = "/auth/native-callback"
  to = "/auth/native-callback.html"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Manifesto de atualização: nunca cachear (sempre versão mais recente)
[[headers]]
  for = "/update-manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate, no-cache, no-store"

# APK: cache curto (10 min) para distribuir versões novas rapidamente
[[headers]]
  for = "/downloads/*.apk"
  [headers.values]
    Cache-Control = "public, max-age=600, must-revalidate"