[build]
  publish = "dist"
  command = "npx tsc --noEmit --skipLibCheck && npm run build"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[dev]
  command   = "vite"
  targetPort = 5173
  port       = 8888
  autoLaunch = false

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200